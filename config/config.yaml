project:
  name: ml-trading-signal-exploration
  seed: 42
  results_dir: results
  run_profile: full
  fast_mode: false
  suppress_lightning_warnings: true
  suppress_lightning_output: true
  torch_device: auto

runtime:
  fast_mode:
    validation:
      train_size: 756
      val_size: 252
      test_size: 252
      step_size: 252
    features:
      advanced_features: false
    models:
      enabled:
        - xgboost
        - lightgbm
        - lstm
      disabled:
        - temporal_fusion_transformer
        - patchtst
        - itransformer
        - mamba
      overrides:
        lstm:
          max_epochs: 8
  full_mode:
    validation:
      train_size: 756
      val_size: 252
      test_size: 252
      step_size: 252
    features:
      advanced_features: true
    models:
      enabled:
        - xgboost
        - lightgbm
        - lstm
        - temporal_fusion_transformer
        - patchtst
        - itransformer
        - mamba
      disabled: []
      overrides:
        lstm:
          max_epochs: 12
        temporal_fusion_transformer:
          max_epochs: 3
          early_stopping_patience: 2
        patchtst:
          max_epochs: 8
        itransformer:
          max_epochs: 8
        mamba:
          max_epochs: 8

data:
  tickers:
    - SPY
    - QQQ
    - IWM
    - TLT
    - GLD
    - BTC-USD
  ticker: SPY
  benchmark_ticker: SPY
  vix_ticker: ^VIX
  start_date: "2010-01-01"
  end_date: null
  source: yfinance
  cache_path: data/spy_daily.csv

features:
  target_horizon: 1
  advanced_features: true
  vix_features: true
  rolling_windows:
    short: 5
    medium: 20
  adf_significance: 0.05
  dropna: true

validation:
  train_size: 756
  val_size: 252
  test_size: 252
  step_size: 126
  min_history: 756

portfolio:
  annualization_factor: 252
  signal_threshold: 0.5
  transaction_cost_bps: 2.0

tuning:
  enabled_models:
    - lstm
    - itransformer
    - patchtst
  n_trials: 15   # was 20
  results_dir: results/optimization
  best_params_dir: results/optimization/best_params
  study_summary_path: results/optimization/study_summary.csv

ensemble:
  base_models:
    - lstm
    - itransformer
    - patchtst
  use_tuned_params: true
  results_dir: results/ensembles
  objective: information_ratio
  long_bias_penalty: 0.5
  max_long_exposure: 0.85

regime:
  enabled: true
  model_type: hmm
  n_regimes: 3
  trade_filter: false
  filter_mode: aggressive
  min_regime_prob: 0.70
  auto_detect_best_regime: true
  use_regime_weighted_ensemble: true
  use_regime_stacking: true
  default_model: regime_stacking_ensemble
  meta_learner: logistic
  include_interactions: false
  base_models:
    - lstm
    - itransformer
    - patchtst
    - temporal_fusion_transformer
  favorable_regimes:
    - 0
    - 1

stress_testing:
  transaction_cost_scenarios:
    - 2.0
    - 5.0
    - 10.0

audit:
  split_budget: 3
  comparative_null_test:
    n_shuffles: 50
    significance_threshold: 0.05
    models:
      - regime_stacking_ensemble_regime
      - stacking_ensemble_baseline
      - itransformer_tuned_regime
      - lstm_regime

models:
  enabled:
    - xgboost
    - lightgbm
    - lstm
    - temporal_fusion_transformer
    - patchtst
    - itransformer
    - mamba
  disabled: []
  xgboost:
    learning_rate: 0.03
    max_depth: 4
    n_estimators: 400
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    early_stopping_rounds: 30
  lightgbm:
    learning_rate: 0.03
    max_depth: 4
    n_estimators: 400
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    early_stopping_rounds: 30
  lstm:
    input_size: 30
    hidden_size: 64
    num_layers: 2
    dropout: 0.1
    bidirectional: false
    batch_size: 64
    max_epochs: 20
    learning_rate: 0.001
    weight_decay: 0.0001
    gradient_clip_val: 0.5
    early_stopping_patience: 5
    scheduler_patience: 2
  temporal_fusion_transformer:
    max_encoder_length: 30
    max_prediction_length: 1
    hidden_size: 16
    attention_head_size: 2
    hidden_continuous_size: 8
    lstm_layers: 1
    dropout: 0.1
    learning_rate: 0.001
    batch_size: 64
    max_epochs: 10
    gradient_clip_val: 0.1
    early_stopping_patience: 3
    reduce_on_plateau_patience: 2
    limit_train_batches: 1.0
    num_workers: 0
  patchtst:
    input_size: 30
    patch_len: 10
    stride: 5
    hidden_size: 64
    feedforward_size: 128
    encoder_layers: 2
    n_heads: 4
    dropout: 0.1
    batch_size: 64
    max_epochs: 20
    learning_rate: 0.001
    weight_decay: 0.0001
    gradient_clip_val: 0.5
    early_stopping_patience: 5
    scheduler_patience: 2
  itransformer:
    input_size: 30
    hidden_size: 64
    feedforward_size: 128
    encoder_layers: 2
    n_heads: 4
    dropout: 0.1
    batch_size: 64
    max_epochs: 20
    learning_rate: 0.001
    weight_decay: 0.0001
    gradient_clip_val: 0.5
    early_stopping_patience: 5
    scheduler_patience: 2
  mamba:
    input_size: 30
    hidden_size: 64
    state_size: 64
    conv_kernel_size: 3
    mixer_layers: 3
    dropout: 0.1
    batch_size: 64
    max_epochs: 20
    learning_rate: 0.001
    weight_decay: 0.0001
    gradient_clip_val: 0.5
    early_stopping_patience: 5
    scheduler_patience: 2
